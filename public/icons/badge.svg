<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Concentric radar rings -->
  <circle cx="48" cy="48" r="42" fill="none" stroke="white" stroke-width="3.5"/>
  <circle cx="48" cy="48" r="28" fill="none" stroke="white" stroke-width="3"/>
  <circle cx="48" cy="48" r="15" fill="none" stroke="white" stroke-width="2.5"/>
  <!-- North tick (12 o'clock) -->
  <line x1="48" y1="6" x2="48" y2="14" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Sweep arm (~2 o'clock) -->
  <line x1="48" y1="48" x2="76" y2="22" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Blip at tip of sweep arm -->
  <circle cx="73" cy="25" r="5.5" fill="white"/>
  <!-- Center dot -->
  <circle cx="48" cy="48" r="5" fill="white"/>
</svg>
